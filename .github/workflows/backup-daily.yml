name: 🔄 Backup Quotidien Supabase → Minio

on:
  # Exécution automatique tous les jours à 3h du matin (UTC)
  schedule:
    - cron: '0 3 * * *'
  
  # Permet de lancer manuellement depuis l'interface GitHub
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  backup-database:
    name: 📦 Backup PostgreSQL
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install dependencies
        run: |
          npm install --prefix scripts/backup @supabase/supabase-js aws-sdk pg dotenv
      
      - name: 🗄️ Backup PostgreSQL
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
        run: |
          node scripts/backup/backup-database.js

      - name: 📊 Backup Storage Buckets
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
        run: |
          node scripts/backup/backup-storage.js

      - name: ✅ Notify Success
        if: success()
        run: |
          echo "✅ Backup completed successfully at $(date)"
          echo "📦 Database backup uploaded to Minio"
          echo "📁 Storage buckets synced to Minio"

      - name: ❌ Notify Failure
        if: failure()
        run: |
          echo "❌ Backup failed at $(date)"
          echo "Check logs above for details"
